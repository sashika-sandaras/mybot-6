- name: Run Script
        env:
          VOE_KEY: ${{ secrets.VOE_KEY }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          FILE_ID: ${{ github.event.inputs.file_id }}
          USER_JID: ${{ github.event.inputs.user_jid }}
        run: |
          cat <<'EOF' > downloader.py
          import os, requests, sys
          file_id = os.getenv('FILE_ID')
          voe_key = os.getenv('VOE_KEY')
          url = None
          
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
          }

          if len(file_id) > 20: # GDrive ID
              url = f"https://drive.google.com/uc?export=download&id={file_id}&confirm=t"
          else: # VOE ID
              api_url = f"https://voe.sx/api/drive/v2/file/info?key={voe_key}&file_code={file_id}"
              r = requests.get(api_url).json()
              url = r.get('result', {}).get('direct_url')

          if url:
              print(f"Downloading from: {url}")
              r = requests.get(url, headers=headers, stream=True, allow_redirects=True)
              with open('movie_mflix.mp4', 'wb') as f:
                  for chunk in r.iter_content(chunk_size=1024*1024): # 1MB chunks
                      if chunk: f.write(chunk)
              
              size = os.path.getsize('movie_mflix.mp4')
              print(f"Download Complete! Size: {size / (1024*1024):.2 dream} MB")
              if size < 10000: # 10KB වලට වඩා අඩු නම් ඒක වීඩියෝ එකක් නෙවෙයි
                  print("Error: File is too small, likely an error page.")
                  sys.exit(1)
          else:
              print("Error: URL not found")
              sys.exit(1)
          EOF
          
          python3 downloader.py
          node send.js
